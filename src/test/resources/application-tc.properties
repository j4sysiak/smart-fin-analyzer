# ==================================================
# PROFIL 'tc' - automatyczny PostgreSQL przez Docker CLI
# ==================================================
# To nie jest klasyczne Testcontainers.
# W tym projekcie kontener testowy uruchamia BaseIntegrationSpec przez `docker run`
# na porcie 15432, a nie przez bibliotekę Testcontainers.
#
# Datasource (URL / user / password) oraz `spring.jpa.hibernate.ddl-auto`
# są ustawiane dynamicznie przez BaseIntegrationSpec (@DynamicPropertySource),
# więc nie definiujemy ich tutaj na sztywno.
#
# Flyway jest domyślnie włączony również dla profilu `tc`, żeby testy mogły
# odtwarzać schemat od migracji zamiast polegać na Hibernate DDL.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Logi SQL wyłączone (włącz na true do debugowania)
spring.jpa.show-sql=false

# Wyłączamy schedulery na czas testów
app.scheduling.enabled=false
spring.task.scheduling.enabled=false
# Shorter async notification delay in tests so the suite does not clog the shared executor
# (for example PessimisticLockingSpec publishes many events and with 6s per event it looks stuck).
app.async.notification.delay-ms=50

# Pozwalamy nadpisywać beany (różne konfiguracje testowe)
spring.main.allow-bean-definition-overriding=true

logging.level.org.flywaydb=DEBUG

# =================================================================
# HIBERNATE ENVERS - uwagi dla testów
# =================================================================
# @Audited jest aktywne dla CategoryEntity.
# TransactionEntity nadal nie ma aktywnego @Audited, więc testy historii dla
# transakcji opierają się na bezpośrednich zapytaniach SQL / tabelach audytowych,
# a nie na pełnym AuditReader dla encji transakcji.
