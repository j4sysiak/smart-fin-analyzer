# Dane beda zapisywane w pliku w folderze 'db' wewnatrz projektu (trwa?a baza H2)
spring.datasource.url=jdbc:h2:file:./db/smartfin_file;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Wlacz konsol? H2 (dost?pna pod adresem http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Pozwalamy Flyway na tworzenie schematu i inicjalizujemy JPA PO migracjach.
# Dzi?ki temu Flyway wykona migracje (z katalogu classpath:db/migration),
# a Hibernate nie b?dzie ponownie tworzy? schematu.
#
# UWAGA:
# - Je?li wcze?niej uruchamia?e? aplikacj? z "spring.jpa.hibernate.ddl-auto=create",
#   plik bazy H2 (./db/smartfin_file.mv.db) mo?e ju? zawiera? tabele utworzone przez Hibernate.
#   W takim wypadku mo?esz usun?? plik bazy (upewnij si?, ?e aplikacja jest zatrzymana) przed
#   restartem, aby Flyway utworzy? czyst? baz? od zera.
# - Alternatywnie, je?li chcesz aby Flyway "zaadoptowa?" istniej?c? schem?, ustaw
#   spring.flyway.baseline-on-migrate=true (ostro?nie - rozwa? backup bazy).
spring.flyway.enabled=true

# Uwaga: próbowano opó?ni? inicjalizacj? JPA (defer) aby Flyway wykona? migracje przed
# inicjalizacj? Hibernate, jednak w tym projekcie powodowa?o to cykliczn? zale?no??
# mi?dzy beanami 'flyway' i 'entityManagerFactory'. Z tego powodu pozostawiamy
# standardowe zachowanie (bez defer). Flyway nadal powinien wykona? migracje podczas
# startu ? je?li pojawi? si? problemy z kolejno?ci?, rozwa? r?czne sterowanie
# kolejno?ci? beanów lub u?ycie plikowej bazy H2 i/usuni?cie starego pliku bazy.
spring.jpa.defer-datasource-initialization=false

# Nie pozwalamy Hibernate automatycznie tworzy? schematu (Flyway ma to robi?)
spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false

# Wystawiamy wszystkie endpointy monitoruj?ce przez HTTP
management.endpoints.web.exposure.include=*
# Pokazujemy szczegó?y zdrowia aplikacji (np. status dysku i bazy H2)
management.endpoint.health.show-details=always



# Batch Processing w Hibernate, aby wysy?a? zapytania paczkami po np. 50 sztuk.
# Musimy nakaza? Hibernate'owi, ?eby grupowa? zapytania.
# Dodaj to do `src/main/resources/application.properties`:
# Optymalizacja Hibernate dla du?ej ilo?ci danych
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


app.scheduling.enabled=false
# opcjonalnie: wy??cza ca?e Spring scheduling
spring.task.scheduling.enabled=false