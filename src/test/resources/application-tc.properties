# ==================================================
# KONFIGURACJA TESTOWA - TESTCONTAINERS (POSTGRESQL)
# ==================================================

# 1. Magiczny URL: 'tc' w ?rodku m¾wi Springowi: "Zanim si? polaczysz, odpal kontener z Postgresem w Docker!"
## Note: BaseIntegrationSpec starts a PostgreSQLContainer and injects the real JDBC URL
## via DynamicPropertySource. Therefore the driver must match the real JDBC URL
## returned by the container (jdbc:postgresql://...). Using the ContainerDatabaseDriver
## together with an actual jdbc:postgresql URL causes a mismatch and startup failure.
spring.datasource.driverClassName=org.postgresql.Driver

# 2. Zarz?dzanie schematem
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# 3. Logi
spring.jpa.show-sql=true

# 4. Upewniamy si?, ?e konsola H2 jest wyl?czona
spring.h2.console.enabled=false

