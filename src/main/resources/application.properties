# =================================================
# SERVER CONFIGURATION
# =================================================
server.port=8080

# =================================================
# DATASOURCE (POSTGRESQL IN DOCKER PORT 5432)
# =================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/smartfin_db
spring.datasource.username=finuser
spring.datasource.password=finpass
spring.datasource.driverClassName=org.postgresql.Driver

# =================================================
# JPA / HIBERNATE OPTIMIZATIONS
# =================================================
# Flyway zarz?dza schematem ? Hibernate nie mo?e go modyfikowa? (ddl-auto=none).
# ddl-auto=update + Flyway jednocze?nie = konflikty sekwencji, podw?jne CREATE TABLE, etc.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
# W??czamy batchowanie dla standardowych operacji JPA
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Generowanie statystyk (wy??cz na produkcji, zostaw w dev do podgl?du wydajno?ci)
spring.jpa.properties.hibernate.generate_statistics=false

# =================================================
# FLYWAY (DATABASE MIGRATIONS)
# =================================================
spring.flyway.enabled=true
# Domyślnie oczekujemy pełnych migracji od V1. baseline-on-migrate może ukryć
# częściowo zainicjalizowany / „niepusty” schemat i doprowadzić do pominięcia
# V1__init_schema.sql, a potem do awarii zależnych migracji (np. na tx_seq).
# Jeśli kiedyś trzeba zaadoptować istniejącą legacy bazę, baseline wykonajmy
# świadomie jednorazowo, zamiast mieć to stale włączone globalnie.
spring.flyway.baseline-on-migrate=false

# =================================================
# MONITORING & OBSERVABILITY (ACTUATOR)
# =================================================
# W portfolio wystawiamy wszystko, aby pokaza? znajomo?? metryk
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# =================================================
# BUSINESS LOGIC CONFIGURATION
# =================================================
# Produkcyjnie chcemy, aby scheduler generowa? raporty
app.scheduling.enabled=true

# Symulowane opóźnienie zewnętrznej notyfikacji po imporcie batcha.
# Produkcyjnie zostawiamy realistyczne 6s, w testach profile nadpisują tę wartość
# krótszym delayem, aby nie zapychać wspólnej puli @Async.
app.async.notification.delay-ms=6000

# Adres API walutowego (mo?na zmieni? bez rekompilacji)
currency.api.url=https://open.er-api.com/v6/latest/PLN












