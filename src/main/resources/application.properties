# Wlacz konsol? H2 dost?pna pod adresem http://localhost:8080/h2-console
# Zwrˇ? uwag? na pole JDBC URL. Upewnij si?, ?e jest tam wpisane: jdbc:h2:file:./db/smartfin
spring.h2.console.enabled=true

# Automatyczne tworzenie tabel na podstawie klas @Entity
# ZMIENIAMY Z update NA validate!
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=false

# Wystawiamy wszystkie endpointy monitoruj?ce przez HTTP
management.endpoints.web.exposure.include=*
# Pokazujemy szczegˇ?y zdrowia aplikacji (np. status dysku i bazy H2)
management.endpoint.health.show-details=always

# W??czamy Flyway
spring.flyway.enabled=true