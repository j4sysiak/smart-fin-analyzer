# ======================================================================================
# PROFIL: local-pg ? Reczny kontener PostgreSQL TYLKO do inspekcji danych w Dockerze
# ======================================================================================
#
# DOMYSLNIE testy uzywaja profilu 'tc' (BaseIntegrationSpec) ? PostgreSQL
# startuje automatycznie przez Docker CLI na porcie 15432.
#
# Profil 'local-pg' jest OPCJONALNY ? uzyj go gdy chcesz recznie
# podejrzec dane w bazie po tescie (np. przez psql, DBeaver, pgAdmin).
#
# Jak uzyc (BEZ zmian w kodzie!):
# 1. Uruchom kontener PostgreSQL:
#    docker run -d --name smartfin-postgres \
#      -e POSTGRES_DB=smartfin_test -e POSTGRES_USER=finuser -e POSTGRES_PASSWORD=finpass \
#      -p 5432:5432 postgres:16-alpine
#
# 2. Uruchom test z flaga -Dlocal.pg=true:
#    ./gradlew test --tests "pl.edu.praktyki.repository.IntegrationDbSpec" "-Dlocal.pg=true"
#
# 3. Polacz sie z baza:
#    docker exec -it smartfin-postgres psql -U finuser -d smartfin_test
#
# 4. Po zakonczeniu:
#    docker stop smartfin-postgres && docker rm smartfin-postgres
# ======================================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/smartfin_test
spring.datasource.username=finuser
spring.datasource.password=finpass

spring.jpa.show-sql=true

# W testach lokalnych Hibernate tworzy/aktualizuje schemat
spring.jpa.hibernate.ddl-auto=update

# Włączamy Flyway dla lokalnego Postgresa (inspekcja) — migracje będą uruchamiane przy starcie
spring.flyway.enabled=true
# W testach local-pg czyścimy schemat przed startem JVM, więc chcemy pełne migracje od V1.
# baseline-on-migrate maskował niepełny cleanup: Flyway bazował schemat na V1,
# pomijał V1__init_schema.sql i V3 wybuchało na brakującym tx_seq.
spring.flyway.baseline-on-migrate=false

# Wylaczenie schedulingu
app.scheduling.enabled=false
spring.task.scheduling.enabled=false
# Shorter async notification delay in tests so full local-pg suite does not look stuck
app.async.notification.delay-ms=50

spring.main.allow-bean-definition-overriding=true