# ==================================================
# PROFIL 'tc' - Testcontainers PostgreSQL
# ==================================================
# Datasource jest ustawiany dynamicznie przez BaseIntegrationSpec
# (@DynamicPropertySource), wi?c nie definiujemy tu URL, user, password.

# Flyway W??CZONE dla profilu 'tc' - pozwala wykona? migracje DB w kontenerze testowym
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Logi SQL wy??czone (w??cz na true do debugowania)
spring.jpa.show-sql=false

# Wy??czamy schedulery na czas test?w
app.scheduling.enabled=false
spring.task.scheduling.enabled=false
# Shorter async notification delay in tests so the suite does not clog the shared executor
# (for example PessimisticLockingSpec publishes many events and with 6s per event it looks stuck).
app.async.notification.delay-ms=50

# Pozwalamy nadpisywa? beany (r??ne konfiguracje testowe)
spring.main.allow-bean-definition-overriding=true

logging.level.org.flywaydb=DEBUG

# =================================================================
# HIBERNATE ENVERS - AKTYWNE dla profilu tc
# =================================================================
# @Audited jest tylko na CategoryEntity (proste kolumny, bez @ElementCollection).
# TransactionEntity NIE MA @Audited ? bug Hibernate HHH-17024 (6.4.1):
#   ClassCastException przy @Audited + @ElementCollection.
# CategoryEntity jest bezpieczna ? Envers dzia?a poprawnie.
#
# UWAGA: SpringSessionContext NIE jest ustawiony ? EnversSpec weryfikuje histori?
# przez bezpo?rednie zapytania SQL (jdbcTemplate), bez AuditReaderFactory.
