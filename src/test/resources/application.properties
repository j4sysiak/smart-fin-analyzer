# ==================================================
# TESTOWY FALLBACK ? nadpisuje produkcyjny application.properties
# ==================================================
# Ten plik ZAST?PUJE produkcyjny src/main/resources/application.properties
# podczas uruchamiania test�w (test classpath ma priorytet).
#
# Integracyjne testy (extends BaseIntegrationSpec) dostaj? DataSource
# z @DynamicPropertySource (Testcontainers PostgreSQL).
# Lekkie testy (@ContextConfiguration) nie ?aduj? auto-konfiguracji DB.

# Flyway wy??czony (schemat tworzony przez Hibernate w testach)
spring.flyway.enabled=false

# Wy??czamy schedulery
app.scheduling.enabled=false

# Pozwalamy nadpisywa? beany
spring.main.allow-bean-definition-overriding=true

# =================================================================
# HIBERNATE ENVERS - AKTYWNE (CategoryEntity @Audited, bez @ElementCollection)
# =================================================================
# TransactionEntity NIE MA @Audited — bug Hibernate HHH-17024:
#   ClassCastException przy @Audited + @ElementCollection (pole tags).
# CategoryEntity (@Audited + proste pola) działa poprawnie z Envers.
#
# UWAGA: SpringSessionContext NIE jest ustawiony — EnversSpec weryfikuje historię
# przez bezpośrednie zapytania SQL (jdbcTemplate), bez AuditReaderFactory.

# =================================================================
# SPRING BATCH - tabele metadanych tworzone automatycznie w testach
# =================================================================
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

