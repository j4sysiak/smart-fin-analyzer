# ======================================================================================
# PROFIL: local-pg - ręczna inspekcja danych w lokalnym PostgreSQL / Dockerze
# ======================================================================================
#
# Domyślnie testy używają profilu `tc`, gdzie PostgreSQL startuje automatycznie
# przez Docker CLI na porcie 15432.
#
# Profil `local-pg` jest opcjonalny i służy głównie do debugowania / inspekcji danych
# po teście (psql, DBeaver, pgAdmin). W tym trybie testy łączą się z lokalnym
# PostgreSQL na localhost:5432 / baza smartfin_test.
#
# Najwygodniejsza ścieżka uruchomienia z README:
# 1. docker compose up -d db
# 2. powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\scripts\clean-db.ps1 -Mode local-pg -Force
# 3. .\gradlew.bat "-Dlocal.pg=true" "-Denable.flyway=true" clean test --no-daemon
#
# Uwaga praktyczna:
# - BaseIntegrationSpec czyści schemat przy starcie JVM i standardowo trunacjuje
#   tabele przed każdym testem.
# - Jeśli chcesz zachować dane do inspekcji po teście, uruchom test z
#   `-Dlocal.pg.keepdata=true`.
# ======================================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/smartfin_test
spring.datasource.username=finuser
spring.datasource.password=finpass

spring.jpa.show-sql=true

# `spring.jpa.hibernate.ddl-auto` jest w praktyce nadpisywane dynamicznie przez
# BaseIntegrationSpec: przy włączonym Flyway będzie `none`, a bez Flyway `update`.
spring.jpa.hibernate.ddl-auto=update

# Flyway jest włączony dla local-pg, żeby schemat był odtwarzany od migracji.
spring.flyway.enabled=true
# W local-pg czyścimy schemat przed startem JVM, więc chcemy pełne migracje od V1.
# baseline-on-migrate maskował niepełny cleanup: Flyway bazował schemat na V1,
# pomijał V1__init_schema.sql i kolejne migracje potrafiły wybuchać na brakujących obiektach.
spring.flyway.baseline-on-migrate=false

# Wyłączenie schedulingu
app.scheduling.enabled=false
spring.task.scheduling.enabled=false
# Shorter async notification delay in tests so full local-pg suite does not look stuck
app.async.notification.delay-ms=50

spring.main.allow-bean-definition-overriding=true