# 1. Magiczny URL: 'tc' w ?rodku mówi Springowi: "Zanim si? pol?czysz, odpal kontener z Postgresem w Docker!"
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///smartfin_db
