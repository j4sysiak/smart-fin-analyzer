spring.datasource.url=jdbc:postgresql://localhost:5432/smartfin_db
spring.datasource.username=smartfin
spring.datasource.password=smartfin123
spring.datasource.driverClassName=org.postgresql.Driver

spring.flyway.enabled=false

# Wy??cz automatyczne czyszczenie przy zamykaniu,
# Testcontainers i tak wywali ca?y kontener, wi?c nie musimy czy?ci? tabel
spring.jpa.hibernate.ddl-auto=create

## Wy??cz du?e logowanie SQL (s?abe dla wydajno?ci testów) i w??cz batching
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# spring.h2.console.enabled=false


app.scheduling.enabled=false
# opcjonalnie: wy??cza ca?e Spring scheduling
spring.task.scheduling.enabled=false